<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="NavyeSIM — Affordable eSIMs for travel" />
  <title>NavyeSIM</title>
  <style>
    /* ── Design tokens (PROJECT_SPEC.md Section 4) ── */
    :root {
      --bg:       #FFFFFF;
      --card-bg:  #F5F5F5;
      --text:     #1A1A1A;
      --accent:   #1B3A6B;
      --radius-card:   8px;
      --radius-btn:    6px;
      --shadow-card:   0 1px 4px rgba(0,0,0,0.08);
      --max-width:     480px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    #app {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 16px;
    }

    /* ── Skeleton loader ── */
    .skeleton {
      background: linear-gradient(90deg, #e0e0e0 25%, #f0f0f0 50%, #e0e0e0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: var(--radius-card);
      height: 80px;
      margin-bottom: 12px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* ── Card ── */
    .card {
      background: var(--card-bg);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      padding: 16px;
      margin-bottom: 12px;
    }

    /* ── Button ── */
    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-btn);
      padding: 10px 20px;
      font-size: 1rem;
      cursor: pointer;
      width: 100%;
    }
    .btn:hover { opacity: 0.9; }

    /* ── Sticky footer ── */
    #sticky-footer {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--accent);
      color: #fff;
      padding: 14px 16px;
      text-align: center;
      font-size: 0.95rem;
    }

    /* ── Error banner ── */
    #error-banner {
      display: none;
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: var(--radius-card);
      padding: 12px;
      margin-bottom: 12px;
      color: #856404;
    }
  </style>
</head>
